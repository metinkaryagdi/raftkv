# Kubernetes deployment of the raftkv cluster as a StatefulSet: stable per-pod
# identity and DNS are exactly what Raft peer addressing needs (each pod's id
# and its peers' addresses must survive restarts/rescheduling). This mirrors how
# etcd is commonly run on Kubernetes.
#
#   kubectl apply -f deploy/k8s/raftkv.yaml
#   kubectl get pods -l app=raftkv -w
#   kubectl port-forward pod/raftkv-0 8001:8001   # then curl 127.0.0.1:8001/status
#
# Peer discovery: each pod's RAFTKV_ID is injected from its own pod name via the
# downward API (raftkv-0, raftkv-1, ...). The binary then derives the full peer
# list itself from RAFTKV_REPLICAS + RAFTKV_SERVICE using the StatefulSet's
# guaranteed stable DNS: <pod>.<service>:<port> (see k8sPeersFromEnv in
# cmd/raftkv/main.go) — no per-pod config needed, all 5 pods share one spec.
#
# Scaling up (scripts/k8s-add-node.sh): RAFTKV_REPLICAS is deliberately bumped
# (via `kubectl set env`) *before* `kubectl scale`, so a new pod's peer list
# already covers every existing member. updateStrategy: OnDelete (below) is
# what makes this safe: by default a StatefulSet's RollingUpdate strategy
# reapplies a changed pod template to every EXISTING pod too, which would
# restart (and, since state is in-memory only, wipe) the whole running
# cluster the moment RAFTKV_REPLICAS changes — verified the hard way against a
# live cluster while building this. OnDelete confines template changes to pods
# that are actually (re)created — i.e. only the new one from `kubectl scale`.
# RAFTKV_GENESIS_SIZE below is a SEPARATE value, frozen forever at "5": it is
# how a pod decides whether it is one of the original members (boots normally)
# or was added later via a scale-up (boots in -join mode, which avoids
# disrupting the live cluster with a premature election even though it already
# knows every peer's address — see k8sPastGenesis in cmd/raftkv/main.go).

apiVersion: v1
kind: Service
metadata:
  name: raftkv-headless
  labels:
    app: raftkv
spec:
  clusterIP: None # headless: DNS resolves directly to each pod's IP
  selector:
    app: raftkv
  ports:
    - name: raft-grpc
      port: 9001
      targetPort: 9001
    - name: client-http
      port: 8001
      targetPort: 8001

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: raftkv
spec:
  serviceName: raftkv-headless
  replicas: 5
  # Start all 5 pods concurrently rather than one-at-a-time: readiness only
  # depends on the HTTP server being up, not on a leader being elected, so there
  # is no bootstrap ordering requirement.
  podManagementPolicy: Parallel
  # OnDelete (not the default RollingUpdate): a pod template change (e.g.
  # bumping RAFTKV_REPLICAS before a scale-up) must never touch already-running
  # pods, only ones that are newly created or explicitly deleted. See the
  # scaling note above the Service block.
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app: raftkv
  template:
    metadata:
      labels:
        app: raftkv
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: raftkv
          image: raftkv:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9001
              name: raft-grpc
            - containerPort: 8001
              name: client-http
          env:
            - name: RAFTKV_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RAFTKV_REPLICAS
              value: "5"
            - name: RAFTKV_GENESIS_SIZE
              value: "5"
            - name: RAFTKV_SERVICE
              value: raftkv-headless
            - name: RAFTKV_RAFT_ADDR
              value: "0.0.0.0:9001"
            - name: RAFTKV_HTTP_ADDR
              value: "0.0.0.0:8001"
          readinessProbe:
            httpGet: { path: /status, port: 8001 }
            initialDelaySeconds: 1
            periodSeconds: 2
          livenessProbe:
            httpGet: { path: /status, port: 8001 }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
