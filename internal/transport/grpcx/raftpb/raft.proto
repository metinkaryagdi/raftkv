syntax = "proto3";

package raftpb;

option go_package = "github.com/metinkaryagdi/raftkv/internal/transport/grpcx/raftpb";

// Raft is the inter-node RPC surface: leader election, log replication, and log
// compaction catch-up.
service Raft {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteReply);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesReply);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotReply);
}

message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  string op = 3;
  string key = 4;
  string value = 5;
  // config_op is "add" or "remove", set only when op == "conf_change". A
  // dedicated field rather than overloading key/value avoids colliding with
  // their existing meaning ("target key" / "value to set").
  string config_op = 6;
}

message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteReply {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesReply {
  uint64 term = 1;
  bool success = 2;
  uint64 conflict_index = 3;
  uint64 conflict_term = 4;
}

// Single, non-chunked snapshot transfer: this project's state machine is a
// small map[string]string, not the multi-gigabyte case the paper's chunked
// offset/done design targets, so streaming would add complexity without
// solving any problem this project actually has.
message InstallSnapshotRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes data = 5;
}

message InstallSnapshotReply {
  uint64 term = 1;
}
